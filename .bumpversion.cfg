[bumpversion]
current_version = 1.0.0
commit = True
tag = True
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)
serialize = {major}.{minor}.{patch}

[bumpversion:file:src/tennis_elo/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:CHANGELOG.md]
search = [Unreleased]
replace = [Unreleased]

[Unreleased]: https://github.com/yourusername/tennis-elo/compare/v{current_version}...HEAD
[{new_version}]: https://github.com/yourusername/tennis-elo/releases/tag/v{new_version}
